<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="120" fill="#09090b"/>
  <rect width="512" height="512" rx="120" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
  </defs>
  <!-- Chart line — rising prediction graph -->
  <polyline
    points="80,360 160,300 240,320 320,200 400,160 440,120"
    fill="none"
    stroke="#f59e0b"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Dot at tip -->
  <circle cx="440" cy="120" r="22" fill="#f59e0b"/>
  <!-- P letter subtle watermark -->
  <text x="72" y="440" font-family="-apple-system,sans-serif" font-size="72" font-weight="700" fill="#f59e0b" opacity="0.15">PM</text>
</svg>
